name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # CI läuft im staging-mode: Pangram-Cache statt API, kein OpenRouter-Call.
      PALIMPSEST_ENV: staging
      PALIMPSEST_PANGRAM_CACHE: ${{ github.workspace }}/tests/staging_corpus/mini_pangram_cache.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps (CPU torch)
        run: |
          # CPU-only torch für CI (kein CUDA-Bedarf, schneller install)
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Verify CLI starts
        run: |
          palimpsest --help | head -5
          humanize --help | head -5

  package-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
